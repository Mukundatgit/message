<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff0f3;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
            z-index: 10;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        h1 { color: #ff4b6e; font-family: 'Dancing Script', cursive; font-size: 2.8rem; margin-top: 0; }
        
        input {
            padding: 12px;
            width: 80%;
            border: 2px solid #ffccd5;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        .btn {
            background-color: #ff4b6e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn:hover { transform: scale(1.05); background-color: #ff335c; }

        #message-area { display: none; text-align: left; }

        #typewriter {
            font-size: 17px;
            line-height: 1.8;
            color: #444;
            white-space: pre-wrap;
        }

        .heart-static { color: #ff4b6e; font-size: 50px; animation: pulse 1.5s infinite; }

        #surprise-btn {
            display: none;
            margin: 20px auto;
            background: linear-gradient(45deg, #ff4b6e, #ff9a9e);
            animation: fadeIn 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .falling-heart {
            position: fixed;
            top: -10%;
            color: #ff4b6e;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <div class="heart-static">❤</div>
        <h1>For My Baby</h1>
        <p>Enter our secret word to begin...</p>
        <input type="password" id="passInput" placeholder="Password">
        <br>
        <button class="btn" onclick="checkPassword()">Unlock My Heart</button>
    </div>

    <div class="container" id="message-area">
        <h1 style="text-align: center;">Happy Birthday, My Love</h1>
        <div id="typewriter"></div>
        <p id="signature" style="text-align: right; font-family: 'Dancing Script'; font-size: 26px; color: #ff4b6e; display:none;">
            Forever yours, Mukund
        </p>
        <button id="surprise-btn" class="btn" onclick="celebrate()">Click for a Birthday Surprise! 🎂</button>
    </div>

    <script>
        const message = `Happiest Birthday to the prettiest of them all and my reason to stay alive.

Every moment with you feels like a beautiful dream come true; I miss my fairytale life with you. You are my greatest support, my strength, and my whole world.

I know I am not the kind of person you wanted me to be, and I am apologizing for it—and always will. I am sorry I have been such a difficult person lately. It’s not okay for me; I die a little every time I speak rudely to you. It hurts me even more with the silence I have created between us.

Life is hard, but it’s never hard with you around. I am never in a rush when I am with you, because you are my calm. I have been crying a lot lately, angry at myself for speaking to you the way I did. Just the thought of you getting away from me kills me.

I don't know how the Good Lord was so merciful to me that He brought you into my life. I know I’m not the perfect guy for you, but I will always love you more than anything I ever thought possible.

I miss being 'me' for you. It has been almost three years. I know things are not good at the moment, but you are truly different from anyone else I’ve ever met. It’s not possible for me to give up on 'us.' I want to prove it to you, because you mean the world to me.

I totally understand how much I hurt you, and I am here today to own it. I should not have spoken to you the way I did. I can take anything for you, just as I will do anything for you. I want to become a better version of myself for you.

You matter to me so much that you cannot even imagine. If love is eternal, even God bends His rules. I’m not asking Him to bend anything but my temper. Your presence is the only source of happiness I have.

My heart stopped searching the moment it found you. You make me complete. Sometimes, things have to go very wrong before they can finally become right.

I am maturing by damage, not just by age.`;

        function checkPassword() {
            const input = document.getElementById("passInput").value;
            if (input === "Mybaby") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("message-area").style.display = "block";
                startHeartRain();
                typeWriterEffect();
            } else {
                alert("That's not it... try again ❤️");
            }
        }

        let i = 0;
        function typeWriterEffect() {
            if (i < message.length) {
                document.getElementById("typewriter").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriterEffect, 45); 
                
                const container = document.getElementById("message-area");
                container.scrollTop = container.scrollHeight;
            } else {
                document.getElementById("signature").style.display = "block";
                document.getElementById("surprise-btn").style.display = "block";
            }
        }

        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4b6e', '#ffccd5', '#ffffff', '#ff9a9e']
            });
        }

        function startHeartRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = Math.random() * 20 + 10 + 'px';
                const duration = Math.random() * 3 + 2;
                heart.style.animationDuration = duration + 's';
                heart.style.opacity = Math.random();
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }, 300);
        }
    </script>
</body>
</html>
