<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('mp1.jpeg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-color: #fff0f3; 
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(8px); 
            padding: 1.5rem; /* Reduced for mobile */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%; /* Wider on small screens */
            z-index: 10;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box; /* Crucial for padding/width math */
        }

        h1 { 
            color: #ff4b6e; 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(1.8rem, 8vw, 2.8rem); /* Responsive size */
            margin-top: 0; 
        }
        
        input {
            padding: 12px;
            width: 90%; /* Responsive width */
            max-width: 300px;
            border: 2px solid #ffccd5;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn {
            background-color: #ff4b6e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
            min-height: 48px; /* Better for mobile touch */
            box-shadow: 0 4px 15px rgba(255, 75, 110, 0.3);
        }

        .btn:hover { transform: scale(1.05); background-color: #ff335c; }

        #message-area { display: none; text-align: left; }

        #typewriter { 
            font-size: clamp(14px, 4vw, 16px); /* Scales down on small phones */
            line-height: 1.6; 
            color: #333; 
            white-space: pre-wrap; 
            font-weight: 400; 
        }

        .heart-static { color: #ff4b6e; font-size: 40px; animation: pulse 1.5s infinite; }

        #surprise-btn {
            display: none;
            margin: 20px auto;
            background: linear-gradient(45deg, #ff4b6e, #ff9a9e);
            animation: fadeIn 2s;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 1rem;
                width: 95%;
            }
            h1 { font-size: 1.8rem; }
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .falling-heart {
            position: fixed;
            top: -10%;
            color: #ff4b6e;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall { to { transform: translateY(110vh); } }

        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-thumb { background: #ffccd5; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container" id="login-box">
        <div class="heart-static">❤</div>
        <h1>For My Baby</h1>
        <p style="font-size: 14px;">Enter our secret word to begin...</p>
        <input type="password" id="passInput" placeholder="Password">
        <br>
        <button class="btn" onclick="checkPassword()">Unlock My Heart</button>
    </div>

    <div class="container" id="message-area">
        <h1 style="text-align: center;">Happy Birthday, My Love 🎂</h1>
        <div id="typewriter"></div>
        <p id="signature" style="text-align: right; font-family: 'Dancing Script'; font-size: 24px; color: #ff4b6e; display:none;">
            Forever yours, Mukund ❤️
        </p>
        <button id="surprise-btn" class="btn" onclick="celebrate()">Click for a Birthday Surprise! 🎉</button>
    </div>

    <script>
        const message = `Happiest Birthday to the prettiest of em all and my reason to stay live.

 ` . // Keep the original text here

        window.onload = function() {
            if (localStorage.getItem("isLoggedIn") === "true") {
                unlock();
            }
        }

        function checkPassword() {
            const input = document.getElementById("passInput").value;
            if (input === "Mybaby") {
                localStorage.setItem("isLoggedIn", "true");
                unlock();
            } else {
                alert("That's not it... try again ❤️");
            }
        }

        function unlock() {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("message-area").style.display = "block";
            startHeartRain();
            typeWriterEffect();
        }

        let i = 0;
        function typeWriterEffect() {
            if (i < message.length) {
                document.getElementById("typewriter").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriterEffect, 30);
                
                const container = document.getElementById("message-area");
                container.scrollTop = container.scrollHeight;
            } else {
                document.getElementById("signature").style.display = "block";
                document.getElementById("surprise-btn").style.display = "block";
            }
        }

        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4b6e', '#ffccd5', '#ffffff', '#ff9a9e', '#ffd700'] 
            });
        }

        function startHeartRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = Math.random() * 15 + 10 + 'px';
                const duration = Math.random() * 3 + 4;
                heart.style.animationDuration = duration + 's';
                heart.style.opacity = Math.random() * 0.6 + 0.4;
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }, 600); // Slightly slower for performance on mobile
        }
    </script>
</body>
</html>
